<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Describer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .file-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .file-info {
            font-size: 14px;
            color: #666;
        }
        
        input[type="file"] {
            display: none;
        }

        .url-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d0d5dd;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 14px;
            outline: none;
        }

        .url-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .status.loading {
            display: block;
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status.error {
            display: block;
            background: #ffebee;
            color: #c62828;
        }
        
        .selected-file {
            margin-top: 10px;
            font-size: 14px;
            color: #333;
            word-break: break-all;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 Video Describer</h1>
        <div class="subtitle">Вставьте ссылку на видео</div>

        <input
            type="url"
            class="url-input"
            id="videoUrl"
            placeholder="https://rutube.ru/video/..."
        >
        
        <div class="upload-area" id="uploadArea">
            <div class="file-icon">📁</div>
            <div class="file-info">Или нажмите/перетащите файл</div>
            <div class="file-info" style="font-size: 12px; margin-top: 5px;">MP4, AVI, MOV, MKV</div>
        </div>
        
        <input type="file" id="fileInput" accept=".mp4,.avi,.mov,.mkv,.wmv,.flv">
        
        <div class="selected-file" id="selectedFile"></div>
        
        <button id="uploadBtn" disabled>Обработать видео</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const videoUrlInput = document.getElementById('videoUrl');
        const uploadBtn = document.getElementById('uploadBtn');
        const selectedFileDiv = document.getElementById('selectedFile');
        const statusDiv = document.getElementById('status');
        
        let selectedFile = null;

        const updateButtonState = () => {
            uploadBtn.disabled = !selectedFile && !videoUrlInput.value.trim();
        };
        
        uploadArea.addEventListener('click', () => fileInput.click());

        videoUrlInput.addEventListener('input', () => {
            if (videoUrlInput.value.trim()) {
                selectedFile = null;
                selectedFileDiv.textContent = '';
                fileInput.value = '';
            }
            updateButtonState();
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                videoUrlInput.value = '';
                selectedFileDiv.textContent = `✅ ${selectedFile.name} (${(selectedFile.size / 1024 / 1024).toFixed(1)} MB)`;
                updateButtonState();
            }
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                videoUrlInput.value = '';
                selectedFileDiv.textContent = `✅ ${selectedFile.name} (${(selectedFile.size / 1024 / 1024).toFixed(1)} MB)`;
                updateButtonState();
            }
        });
        
        uploadBtn.addEventListener('click', async () => {
            const videoUrl = videoUrlInput.value.trim();
            if (!selectedFile && !videoUrl) return;
            
            const formData = new FormData();
            if (selectedFile) {
                formData.append('file', selectedFile);
            } else {
                formData.append('video_url', videoUrl);
            }
            
            uploadBtn.disabled = true;
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '⏳ Скачивание и последовательная обработка видео...';
            
            try {
                const response = await fetch('/video/upload/', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Ошибка загрузки');
                }
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `result_${selectedFile ? selectedFile.name : 'video_url'}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ Видео обработано! JSON-отчет скачан автоматически.';
                
                selectedFile = null;
                selectedFileDiv.textContent = '';
                fileInput.value = '';
                videoUrlInput.value = '';
                
                setTimeout(() => {
                    statusDiv.className = 'status';
                    updateButtonState();
                }, 3000);
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Ошибка: ${error.message}`;
                updateButtonState();
                
                setTimeout(() => {
                    statusDiv.className = 'status';
                }, 5000);
            }
        });
    </script>
</body>
</html>
